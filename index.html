<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLPI Ticket Analyzer</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .controls { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; align-items: flex-end; background: #f5f5f5; padding: 15px; border-radius: 8px; }
        .control-group { display: flex; flex-direction: column; }
        label { font-size: 12px; font-weight: bold; margin-bottom: 5px; }
        button { padding: 10px 15px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; height: 38px;}
        button:hover { background: #0056b3; }
        canvas { border: 1px solid #ccc; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 100%; height: auto; }
    </style>
</head>
<body>
    <h1>GLPI Ticket Analyzer</h1>
    
    <div class="controls">
        <div class="control-group">
            <label for="csvFileInput">Upload CSV</label>
            <input type="file" id="csvFileInput" accept=".csv" style="height: 22px;">
        </div>
        <div class="control-group">
            <label for="analysisType">Analysis Type</label>
            <select id="analysisType" style="height: 26px;">
                <option value="ticketsOpened">Tickets Opened</option>
                <option value="activeTickets">Active Tickets</option>
                <option value="activeTicketsAge">Active Tickets by Age (<=4 Wk)</option>
                <option value="activeTicketsAgeV2">Active Tickets by Age (10+ Wk)</option>
                <option value="activeTicketsAgeV3">Active Tickets by Age (10+ Wk Flipped)</option>
                <option value="categoryPie">Tickets by Category</option>
                <option value="entityPie">Tickets by Entity</option>
            </select>
        </div>
        <div class="control-group">
            <label for="interval">Interval</label>
            <select id="interval" style="height: 26px;">
                <option value="daily">Daily</option>
                <option value="weekly" selected>Weekly</option>
                <option value="monthly">Monthly</option>
                <option value="yearly">Yearly</option>
            </select>
        </div>
        <div class="control-group">
            <label for="startDate">Start Date</label>
            <input type="date" id="startDate" style="height: 22px;">
        </div>
        <div class="control-group">
            <label for="endDate">End Date</label>
            <input type="date" id="endDate" style="height: 22px;">
        </div>
        <div class="control-group">
            <label for="canvasWidth">Width (px)</label>
            <input type="number" id="canvasWidth" placeholder="1000" style="width: 80px; height: 22px;">
        </div>
        <div class="control-group">
            <label for="canvasHeight">Height (px)</label>
            <input type="number" id="canvasHeight" placeholder="500" style="width: 80px; height: 22px;">
        </div>
        <button id="generateBtn">Generate Graph</button>
    </div>

    <canvas id="graphCanvas"></canvas>
    
    <div id="statsContainer" style="margin-top: 40px; font-family: sans-serif;"></div>

    <script src="app.js"></script>
</body>
</html>
